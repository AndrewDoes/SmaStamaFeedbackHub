services:
  db:
    image: postgres:15-alpine
    container_name: smastama-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smastama-backend
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__AzureBlobStorage=DefaultEndpointsProtocol=${AZURE_BLOB_STORAGE_URL}
      - AzureStorage__ContainerName=proof-attachments
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=https://smastama.com
      - Jwt__Audience=https://smastama.com
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smastama-frontend
    restart: always
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

  proxy:
    image: caddy:latest
    container_name: smastama-proxy
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/certificates:/etc/caddy/certificates
    depends_on:
      - frontend

volumes:
  postgres_data:
