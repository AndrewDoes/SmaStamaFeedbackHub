services:
  db:
    image: postgres:15-alpine
    container_name: smastama-db
    restart: always
    environment:
      POSTGRES_DB: smastama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: smastama_dev_db_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smastama-backend
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=smastama;Username=postgres;Password=smastama_dev_db_pass
      - ConnectionStrings__AzureBlobStorage=${AZURE_STORAGE_CONNECTION_STRING:-}
      - AzureStorage__ContainerName=proof-attachments
      - Jwt__Key=SecretKeyMustBeVeryLongToBeSecure123!_Production_Value
      - Jwt__Issuer=https://smastama.com
      - Jwt__Audience=https://smastama.com
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smastama-frontend
    restart: always
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

  proxy:
    image: caddy:latest
    container_name: smastama-proxy
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/certificates:/etc/caddy/certificates
    depends_on:
      - frontend

volumes:
  postgres_data:
